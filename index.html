<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一瞬チャレンジ！いま何個？Pro</title>
    <style>
        :root {
            --bg-color: #E0F7FA; /* うすい水色 */
            --text-color: #006064; /* 濃い青緑 */
            --btn-primary: #4CAF50;
            --btn-secondary: #2196F3;
            --choice-bg: #03A9F4; /* 鮮やかな水色に変更 */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none; /* 誤操作防止 */
            -webkit-user-select: none;
        }

        /* ゲームメインエリア */
        #game-area {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* メッセージ表示（予告・質問・正解） */
        #message-overlay {
            font-size: 5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 20;
            pointer-events: none; /* 下の図形をクリックしないように */
            text-shadow: 2px 2px 0px rgba(255,255,255,0.5);
            width: 100%;
            text-align: center;
            height: 100%; /* 上下中央揃えのため */
        }

        /* 質問の中のアイコン */
        #message-overlay .emoji {
            font-size: 5rem; /* 顔文字は横に長いため少し縮小 */
            line-height: 1;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
            white-space: nowrap; /* 顔文字の改行防止 */
        }

        /* 出現する顔文字 */
        .shape {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .shape .emoji {
            line-height: 1;
            filter: drop-shadow(3px 3px 2px rgba(0,0,0,0.15));
            display: block;
            white-space: nowrap; /* 顔文字の改行防止 */
        }

        /* 操作パネル（下部に小さく） */
        #action-bar {
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            background: rgba(255,255,255,0.4);
            border-top: 1px solid rgba(0,0,0,0.05);
            position: relative;
            z-index: 30;
        }

        /* 先生用ボタン */
        .btn-sm {
            padding: 10px 24px;
            font-size: 1.3rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            color: white;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .btn-sm:active { transform: translateY(2px); }
        #btn-start { background: var(--btn-primary); }
        #btn-check { background: var(--btn-secondary); display: none; }

        /* 回答ボタン（生徒用） */
        .choice-btn {
            padding: 10px 50px;
            font-size: 3.5rem;
            background: var(--choice-bg);
            color: white;
            border: none;
            border-radius: 20px;
            margin: 0 15px;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .choice-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* ⚙ 歯車ボタン（設定） */
        #settings-trigger {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 2.5rem;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
            z-index: 100;
            background: none;
            border: none;
        }
        #settings-trigger:hover { opacity: 1; }

        /* 設定画面（モーダル） */
        #settings-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 200;
            width: 90%;
            max-width: 650px; /* 顔文字が横長なので少し広げる */
            max-height: 90vh;
            overflow-y: auto;
            color: #333;
        }

        #settings-modal h2 {
            margin-top: 0;
            color: var(--text-color);
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .setting-row {
            margin-bottom: 20px;
            border-bottom: 1px dashed #eee;
            padding-bottom: 15px;
        }
        .setting-row:last-child { border-bottom: none; }

        .setting-row label.main-label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.1rem;
            color: #555;
        }

        .setting-row select, .setting-row input[type="number"] {
            padding: 10px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: #fff;
        }

        .number-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
        }
        .number-input-group input { width: 80px; text-align: center; }

        .check-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .check-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            background: #f5f5f5;
            padding: 5px 15px;
            border-radius: 20px;
        }
        .check-group input[type="checkbox"] { transform: scale(1.3); }
        .check-group .emoji-mini { font-size: 1.2rem; line-height: 1; font-weight: bold; }

        #close-settings {
            width: 100%;
            padding: 15px;
            background: #607D8B;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* 背景を暗くするオーバーレイ */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 150;
        }
    </style>
</head>
<body>

    <button id="settings-trigger">⚙️</button>

    <div id="modal-overlay"></div>
    <div id="settings-modal">
        <h2>せってい</h2>

        <div class="setting-row">
            <label class="main-label">表示する顔文字</label>
            <div class="check-group">
                <label><input type="checkbox" class="shape-check" value="face1" checked><span class="emoji-mini">(*'▽')</span> にっこり</label>
                <label><input type="checkbox" class="shape-check" value="face2"><span class="emoji-mini">( ´∀｀ )</span> ほっこり</label>
                <label><input type="checkbox" class="shape-check" value="face3"><span class="emoji-mini">(・∀・)</span> キリッ</label>
                <label><input type="checkbox" class="shape-check" value="face4"><span class="emoji-mini">(￣▽￣)</span> ニヤリ</label>
                
                <label><input type="checkbox" class="shape-check" value="face5"><span class="emoji-mini">(&gt;_&lt;)</span> いてて</label>
                <label><input type="checkbox" class="shape-check" value="face6"><span class="emoji-mini">( ﾟДﾟ)</span> びっくり</label>
                <label><input type="checkbox" class="shape-check" value="face7"><span class="emoji-mini">( *´艸｀)</span> うふふ</label>
                <label><input type="checkbox" class="shape-check" value="face8"><span class="emoji-mini">( ˘ω˘ )</span> すやぁ</label>

                <label><input type="checkbox" class="shape-check" value="face9"><span class="emoji-mini">(≧▽≦)</span> わーい</label>
                <label><input type="checkbox" class="shape-check" value="face10"><span class="emoji-mini">(´；ω；`)</span> ぴえん</label>
                <label><input type="checkbox" class="shape-check" value="face11"><span class="emoji-mini">(｀・ω・´)</span> シャキーン</label>

                <label><input type="checkbox" class="shape-check" value="dog"><span class="emoji-mini">(Ｕ・ω・Ｕ)</span> いぬ</label>
                <label><input type="checkbox" class="shape-check" value="cat"><span class="emoji-mini">(=^・^=)</span> ねこ</label>
                <label><input type="checkbox" class="shape-check" value="fish"><span class="emoji-mini">(゜))&lt;&lt;</span> さかな</label>

                <label><input type="checkbox" class="shape-check" value="bear"><span class="emoji-mini">(・(ｪ)・)</span> くま</label>
                <label><input type="checkbox" class="shape-check" value="pig"><span class="emoji-mini">( ´(00)ˋ )</span> ぶた</label>
            </div>
        </div>

        <div class="setting-row">
            <label class="main-label">個数（最小 〜 最大）</label>
            <div class="number-input-group">
                <input type="number" id="min-count" value="3" min="1" max="20">
                <span>個 〜 </span>
                <input type="number" id="max-count" value="8" min="1" max="20">
                <span>個</span>
            </div>
        </div>

        <div class="setting-row">
            <label class="main-label">表示時間</label>
            <select id="display-time" style="width:100%">
                <option value="300">0.3秒 (超速い)</option>
                <option value="700" selected>0.7秒 (ふつう)</option>
                <option value="1500">1.5秒 (ゆっくり)</option>
                <option value="2500">2.5秒 (じっくり)</option>
            </select>
        </div>

        <div class="setting-row">
            <label class="main-label">詳細ルール</label>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div style="grid-column: span 2;">
                    <div style="font-size:0.9rem; margin-bottom:4px;">表示のルール</div>
                    <select id="color-rule" style="width:100%">
                        <option value="normal" selected>そのまま</option>
                        <option value="rotate">回転あり</option>
                    </select>
                </div>
                <div>
                    <div style="font-size:0.9rem; margin-bottom:4px;">大きさ</div>
                    <select id="size-rule" style="width:100%"><option value="uniform">同じ大きさ</option><option value="random">大小バラバラ</option></select>
                </div>
                <div>
                    <div style="font-size:0.9rem; margin-bottom:4px;">回答方法</div>
                    <select id="answer-mode" style="width:100%"><option value="buttons">2択ボタン</option><option value="none">ボタンなし</option></select>
                </div>
            </div>
        </div>

        <button id="close-settings">設定を閉じる</button>
    </div>

    <div id="game-area">
        <div id="message-overlay"></div>
    </div>

    <div id="action-bar">
        <button id="btn-choice-1" class="choice-btn"></button>
        <button id="btn-choice-2" class="choice-btn"></button>

        <button id="btn-start" class="btn-sm">つぎへ ▶</button>
        <button id="btn-check" class="btn-sm">こたえ</button>
    </div>

    <script>
        /**
         * アプリの設定と状態管理
         */
        const config = {
            shapes: ['face1'],
            time: 700,
            min: 3,
            max: 8,
            color: 'normal',
            size: 'uniform',
            answer: 'buttons'
        };

        const state = {
            layoutItems: [], // 座標・サイズを含めた確定情報
            target: '',
            count: 0,
            active: false
        };

        // 顔文字マップ
        const EMOJI = {
            face1: "(*'▽')",
            face2: "( ´∀｀ )",
            face3: "(・∀・)",
            face4: "(￣▽￣)",

            face5: "(>_<)",
            face6: "( ﾟДﾟ)",
            face7: "( *´艸｀)",
            face8: "( ˘ω˘ )",

            face9: "(≧▽≦)",
            face10: "(´；ω；`)",
            face11: "(｀・ω・´)",

            dog: "(Ｕ・ω・Ｕ)",
            cat: "(=^・^=)",
            fish: "(゜))<<",

            bear: "(・(ｪ)・)",
            pig: "( ´(00)ˋ )"
        };

        /**
         * 顔文字HTML生成ヘルパー
         */
        function getEmojiHTML(type) {
            const ch = EMOJI[type] || '(・ω・)';
            // span にして size をCSSで制御できるようにする
            return `<span class="emoji" aria-hidden="true">${ch}</span>`;
        }

        /**
         * Web Audio API による効果音生成
         */
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const t = audioCtx.currentTime;

            if (type === 'pop') { // 出現音
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, t);
                gain.gain.setValueAtTime(0.1, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
                osc.start(t);
                osc.stop(t + 0.1);
            } else if (type === 'correct') { // 正解ピンポン
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1046.5, t); // C6
                osc.frequency.setValueAtTime(2093.0, t + 0.1); // C7
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
                osc.start(t);
                osc.stop(t + 0.5);
            } else if (type === 'wrong') { // 不正解ブブー
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, t);
                osc.frequency.linearRampToValueAtTime(100, t + 0.3);
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                osc.start(t);
                osc.stop(t + 0.3);
            }
        }

        /**
         * 待機関数
         */
        const wait = (ms) => new Promise(r => setTimeout(r, ms));

        /**
         * ゲームメインシーケンス
         */
        async function playSequence() {
            if (state.active) return;
            state.active = true;

            updateConfig(); // 設定反映
            resetUI();

            clearAllShapes();

            // 問題データ生成
            const types = config.shapes.length ? config.shapes : ['face1'];

            // 個数決定
            let minC = parseInt(config.min);
            let maxC = parseInt(config.max);
            if (minC > maxC) [minC, maxC] = [maxC, minC];
            const num = Math.floor(Math.random() * (maxC - minC + 1)) + minC;

            let tempItems = [];

            // 顔文字タイプをランダムに決定
            for (let i = 0; i < num; i++) {
                tempItems.push(types[Math.floor(Math.random() * types.length)]);
            }

            // 実際に存在する中からターゲットを選ぶ
            const existing = [...new Set(tempItems)];
            state.target = existing[Math.floor(Math.random() * existing.length)];

            // 正解数
            state.count = tempItems.filter(x => x === state.target).length;

            // レイアウト生成（座標・サイズを確定）
            generateLayout(tempItems);

            // --- 1. 予告フェーズ ---
            const msgHtml = `${getEmojiHTML(state.target)} は いくつ？`;
            document.getElementById('message-overlay').innerHTML = msgHtml;

            await wait(1000); // 1秒予告

            // --- 2. ブランク ---
            document.getElementById('message-overlay').innerHTML = '';
            await wait(300);

            // --- 3. フラッシュ ---
            renderItems(false); // 表示
            playSound('pop');
            await wait(config.time);

            renderItems(true); // 非表示

            // --- 4. 回答受付 ---
            document.getElementById('message-overlay').innerHTML = msgHtml; // 質問再表示

            if (config.answer === 'buttons') {
                // ダミーの回答生成
                let wrong = state.count + (Math.random() > 0.5 ? 1 : -1);
                if (wrong < 1) wrong = state.count + 2;
                if (wrong === state.count) wrong = state.count + 1;

                const isLeftCorrect = Math.random() > 0.5;
                const btn1 = document.getElementById('btn-choice-1');
                const btn2 = document.getElementById('btn-choice-2');

                btn1.innerText = isLeftCorrect ? state.count : wrong;
                btn1.onclick = () => checkAnswer(parseInt(btn1.innerText));

                btn2.innerText = isLeftCorrect ? wrong : state.count;
                btn2.onclick = () => checkAnswer(parseInt(btn2.innerText));

                btn1.style.display = 'block';
                btn2.style.display = 'block';
            } else {
                // ボタンなしモード
                document.getElementById('btn-check').style.display = 'block';
            }

            state.active = false;
        }

        /**
         * レイアウト生成（座標・サイズを確定しstateに保存）
         */
        function generateLayout(itemTypes) {
            const area = document.getElementById('game-area');
            const w = area.clientWidth;
            const h = area.clientHeight;

            // 画面サイズと個数に基づいて「顔文字の見た目サイズ（px）」を計算
            // 顔文字は横に長いためベースサイズを少し小さめに調整
            const basePx = Math.min(Math.max(Math.sqrt((w * h) / (itemTypes.length * 4)), 50), 180);

            state.layoutItems = []; // リセット
            const placed = [];

            itemTypes.forEach(type => {
                const px = config.size === 'random' ? basePx * (0.75 + Math.random() * 0.55) : basePx;
                let x, y, overlap, tries = 0;

                // 重ならない位置を探す（横長の顔文字を考慮して少し余裕を持たせる）
                do {
                    overlap = false;
                    x = Math.random() * (w - px * 2) + px;
                    y = Math.random() * (h - px) + px / 2;
                    for (let p of placed) {
                        // 横幅を考慮した大まかな距離判定
                        const distX = Math.abs(x - p.x);
                        const distY = Math.abs(y - p.y);
                        if (distX < (px + p.px) * 0.8 && distY < (px + p.px) * 0.5) {
                            overlap = true;
                            break;
                        }
                    }
                } while (overlap && tries++ < 150);

                placed.push({ x, y, px });

                // 回転（表示ルールが「回転あり」のときだけ）
                const rot = (config.color === 'rotate') ? Math.floor(Math.random() * 360) : 0;

                state.layoutItems.push({
                    type,
                    x,
                    y,
                    px,
                    rot
                });
            });
        }

        /**
         * 顔文字を全消去する
         */
        function clearAllShapes() {
            const area = document.getElementById('game-area');
            const old = area.querySelectorAll('.shape');
            old.forEach(e => e.remove());
        }

        /**
         * 顔文字描画（保存されたレイアウトを使用）
         */
        function renderItems(hidden) {
            clearAllShapes();
            if (hidden) return;

            const area = document.getElementById('game-area');

            state.layoutItems.forEach(item => {
                const el = document.createElement('div');
                el.className = 'shape';
                
                el.style.left = item.x + 'px';
                el.style.top = item.y + 'px';

                // 表示ルール：回転あり
                el.style.transform = `translate(-50%, -50%) rotate(${item.rot || 0}deg)`;

                el.innerHTML = getEmojiHTML(item.type);
                const emo = el.querySelector('.emoji');
                if (emo) {
                    emo.style.fontSize = item.px + 'px';
                }

                area.appendChild(el);
            });
        }

        /**
         * 回答チェック
         */
        function checkAnswer(val) {
            if (val === state.count) {
                playSound('correct');
            } else {
                playSound('wrong');
            }
            finishGame();
        }

        // 先生用「こたえ」ボタン
        document.getElementById('btn-check').onclick = finishGame;

        /**
         * ゲーム終了・正解表示
         */
        function finishGame() {
            renderItems(false); // 顔文字を再表示

            // 正解の文字は表示しない
            document.getElementById('message-overlay').innerHTML = '';

            document.getElementById('btn-choice-1').style.display = 'none';
            document.getElementById('btn-choice-2').style.display = 'none';
            document.getElementById('btn-check').style.display = 'none';
            document.getElementById('btn-start').style.display = 'block';
        }

        function resetUI() {
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-check').style.display = 'none';
            document.getElementById('message-overlay').innerHTML = '';
        }

        /**
         * 設定パネル操作
         */
        function updateConfig() {
            const checked = document.querySelectorAll('.shape-check:checked');
            if (checked.length > 0) {
                config.shapes = Array.from(checked).map(c => c.value);
            }

            config.min = document.getElementById('min-count').value;
            config.max = document.getElementById('max-count').value;
            config.time = parseInt(document.getElementById('display-time').value);
            config.color = document.getElementById('color-rule').value;
            config.size = document.getElementById('size-rule').value;
            config.answer = document.getElementById('answer-mode').value;
        }

        const modal = document.getElementById('settings-modal');
        const overlay = document.getElementById('modal-overlay');

        document.getElementById('settings-trigger').onclick = () => {
            modal.style.display = 'block';
            overlay.style.display = 'block';
        };

        const closeFunc = () => {
            modal.style.display = 'none';
            overlay.style.display = 'none';
            updateConfig();
        };

        document.getElementById('close-settings').onclick = closeFunc;
        overlay.onclick = closeFunc;

        // スタートボタン
        document.getElementById('btn-start').onclick = playSequence;

        // 初期ロード時に設定反映
        updateConfig();
    </script>
</body>
</html>
